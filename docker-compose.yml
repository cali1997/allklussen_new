version: '3.8'
services:
  web:
    build: .
    container_name: allklussen_web
    expose:
      - "8000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=production
    command: flask run --host=0.0.0.0 --port=8000

  nginx:
    image: nginx:latest
    container_name: allklussen_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web
